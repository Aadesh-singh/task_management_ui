<div class="fixed top-6 right-6 z-50 flex flex-col gap-4 pointer-events-none w-full max-w-xs">
  @for (toast of toasts(); track toast.id) {
    <div 
      class="pointer-events-auto flex items-center p-4 rounded-xl border backdrop-blur-md shadow-2xl animate-fade-in animate-slide-up"
      [ngClass]="getIconClass(toast.type)">
      
      <div class="flex-shrink-0">
        @if (toast.type === 'success') {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        } @else if (toast.type === 'error') {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        } @else {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        }
      </div>

      <div class="ml-3 text-sm font-medium pr-8">
        {{ toast.message }}
      </div>

      <button 
        (click)="remove(toast.id)"
        class="ml-auto -mx-1.5 -my-1.5 p-1.5 inline-flex h-8 w-8 rounded-lg focus:ring-2 focus:ring-gray-300 p-1.5 hover:bg-white/10 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
  }
</div>
