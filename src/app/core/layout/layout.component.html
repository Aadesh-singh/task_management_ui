<div class="flex h-screen overflow-hidden bg-background">
  <!-- Sidebar -->
  <aside class="w-20 lg:w-64 bg-surface border-r border-slate-700/50 flex flex-col transition-all duration-300">
    <!-- Logo -->
    <div class="h-16 flex items-center justify-center lg:justify-start lg:px-6 border-b border-white/5">
      <div
        class="w-8 h-8 rounded bg-primary flex items-center justify-center text-white font-bold text-xl shadow-[0_0_15px_rgba(99,102,241,0.5)]">
        T
      </div>
      <span class="hidden lg:block ml-3 font-semibold text-lg tracking-wide text-white">TaskFlow</span>
    </div>

    <!-- Nav Items -->
    <nav class="flex-1 py-6 flex flex-col gap-2 px-3">
      <a routerLink="/" routerLinkActive="bg-primary/10 text-primary" [routerLinkActiveOptions]="{exact: true}"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span class="hidden lg:block">Dashboard</span>
      </a>
      <a routerLink="/projects" routerLinkActive="bg-primary/10 text-primary"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
          <polyline points="2 17 12 22 22 17"></polyline>
          <polyline points="2 12 12 17 22 12"></polyline>
        </svg>
        <span class="hidden lg:block">Projects</span>
      </a>
      @if (isTeamUser()) {
      <a routerLink="/teams" routerLinkActive="bg-primary/10 text-primary"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
        <span class="hidden lg:block">Team</span>
      </a>
      }
    </nav>

    <!-- User Profile mini -->
    <div class="flex justify-between items-center ">
      <div
        class="h-16 flex items-center justify-center lg:justify-start lg:px-6 border-t border-white/5 cursor-pointer hover:bg-slate-800/50 transition">
        <img
          src="https://ui-avatars.com/api/?name={{ currentUser()?.firstName }}+{{ currentUser()?.lastName }}&background=6366f1&color=fff"
          alt="User" class="w-8 h-8 rounded-full border border-slate-600">
        <div class="hidden lg:block ml-3">
          <p class="text-sm font-medium text-white leading-none">{{ currentUser()?.username }}</p>
          <p class="text-[11px] text-slate-500 mt-1">{{ currentUser()?.['role'] }}</p>
        </div>
      </div>
      <div class="align-right p-10 cursor-pointer" (click)="logout()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
      </div>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col relative overflow-hidden">

    <!-- Top Navbar (Glass) -->
    <header class="h-16 glass-nav absolute top-0 left-0 right-0 z-10 flex items-center justify-between px-8">
      <div class="relative w-64 hidden md:block">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" placeholder="Search tasks, teammates..."
          class="w-full bg-slate-900/50 border border-slate-700 rounded-full pl-10 pr-4 py-1.5 text-sm text-white focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all">
      </div>

      <div class="flex items-center gap-4 ml-auto">
        <button class="relative p-2 text-slate-400 hover:text-white transition">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>
      </div>
    </header>

    <!-- Dynamic Page Content -->
    <div class="flex-1 overflow-auto pt-16 bg-gradient-to-br from-background to-[#0b1120]">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
